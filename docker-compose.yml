# Phala Cloud CVM deployment.
#
# Mounting /var/run/tappd.sock into the container lets api/services/tee.py
# request real Intel TDX DCAP attestation quotes via the dstack tappd daemon.
# Without that mount, is_in_cvm() returns False and tee.py serves
# "NOT_IN_CVM:..." placeholders.
#
# Set sensitive env vars (ANTHROPIC_API_KEY, AGENT_PRIVATE_KEY,
# ESCROW_CONTRACT_ADDRESS) via Phala Cloud's encrypted env-var UI — do not
# inline them here.

services:
  app:
    image: docker.io/kkoci/confidential-agent-market:0.1.7
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # Phala's modern guest-agent socket (was /var/run/tappd.sock pre-0.5).
      # dstack-sdk 0.5+ defaults to this path.
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
    environment:
      # Public config (safe to commit)
      KITE_RPC_URL: https://rpc-testnet.gokite.ai/
      KITE_CHAIN_ID: "2368"
      FACILITATOR_URL: https://facilitator.pieverse.io
      PAY_TO_ADDRESS: "0x4812fC05e79ddc616346d10A8826B2bdf5e6ab20"
      TESTNET_ASSET:  "0x1b7425d288ea676FCBc65c29711fccF0B6D5c293"
      AGENT_MODEL: claude-haiku-4-5-20251001
      # Pieverse facilitator is currently broken (see PIEVERSE_FIX.md).
      # Keep payment checks skipped until they ship a fix.
      SKIP_PAYMENT_CHECK: "true"
      # Encrypted secrets — set values in Phala Cloud UI (Encrypted Secrets);
      # compose MUST reference them via ${VAR} for the TEE to inject them at boot.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGENT_PRIVATE_KEY: ${AGENT_PRIVATE_KEY}
      ESCROW_CONTRACT_ADDRESS: ${ESCROW_CONTRACT_ADDRESS}
